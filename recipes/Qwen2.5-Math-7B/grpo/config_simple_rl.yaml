# Model arguments
model_name_or_path: /pri_exthome/Mamba/Model/Qwen/Qwen2.5-Math-7B
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: /pri_exthome/Mamba/Dataset/General/MATH-lighteval
dataset_configs:
- train
# Num processes is less by 1 as vLLM is using 1 GPU
num_processes: 7

# GRPO trainer config
bf16: true
use_vllm: true
vllm_device: auto
vllm_gpu_memory_utilization: 0.7
do_eval: true
eval_strategy: 'no'
# eval_steps: 10
gradient_accumulation_steps: 8
gradient_checkpointing: false
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: Qwen2.5-Math-7B_Open-R1_GRPO
hub_strategy: every_save
log_level: info
logging_steps: 2
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 512
max_completion_length: 1024
max_steps: -1
num_generations: 7
num_train_epochs: 1
output_dir: /pri_exthome/Mamba/Project/Open-R1/Qwen2.5-Math-7B/GRPO
overwrite_output_dir: true
per_device_eval_batch_size: 2
per_device_train_batch_size: 2
push_to_hub: false
report_to:
- wandb
run_name: Qwen2.5-Math-7B_Open-R1_GRPO
save_strategy: 'steps'
save_steps: 10
# save_total_limit: 2
seed: 42
data_seed: 42

optim: adamw_torch_fused
learning_rate: 3e-06
warmup_ratio: 0.1
