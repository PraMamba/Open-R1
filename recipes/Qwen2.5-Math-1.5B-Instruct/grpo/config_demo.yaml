# Model arguments
model_type: &model_type "Qwen2.5-Math-1.5B-Instruct"
model_name_or_path: "/pri_exthome/Mamba/Model/Qwen/Qwen2.5-Math-1.5B-Instruct"
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: /pri_exthome/Mamba/Dataset/General/OpenR1-Math-220k
dataset_configs:
- all
validation_split: 0.1

# Num processes is less by 1 as vLLM is using 1 GPU
num_processes: 7

# GRPO trainer config
bf16: true
use_vllm: true
vllm_device: auto
num_generations: 7
vllm_gpu_memory_utilization: 0.7
max_prompt_length: 512
max_completion_length: 32768

do_eval: true
eval_strategy: steps
eval_steps: 10
gradient_accumulation_steps: 1
gradient_checkpointing: false
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: Qwen2.5-Math-1.5B-Instruct_Open-R1_GRPO
hub_strategy: every_save
log_level: info
logging_steps: 2
logging_strategy: steps
lr_scheduler_type: linear
max_steps: -1
num_train_epochs: 1
output_dir: "/pri_exthome/Mamba/Project/Open-R1/Qwen2.5-Math-1.5B-Instruct/GRPO"
overwrite_output_dir: true
per_device_eval_batch_size: 4   
per_device_train_batch_size: 6
push_to_hub: false
report_to:
- wandb
run_name: Qwen2.5-Math-1.5B-Instruct_Open-R1_GRPO
save_strategy: steps
save_steps: 10
save_total_limit: 10
metric_for_best_model: reward
greater_is_better: True
dataloader_num_workers: 4

seed: 42
data_seed: 42
log_on_each_node: False
logging_first_step: True

optim: adamw_torch_fused
learning_rate: 5e-5
warmup_ratio: 0.1
